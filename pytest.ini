[pytest]
# Omni-Dev CLI test configuration.
# The full suite runs offline against the injected FakeBackend (Requirement 8.8).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers used by the spec test suite. Registering them here keeps
# `pytest --strict-markers` clean and documents their intent.
markers =
    property: a Hypothesis-backed property test implementing a design correctness property
    example: an example/scenario test covering a specific case or error mapping
    edge_case: an edge/boundary-condition test
    integration: a wiring/integration test (e.g. MCP registration) using fakes/temp dirs
    slow: a longer-running test

addopts = -ra
